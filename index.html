<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dhanika Instruments</title>
    <!-- Include Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="header">
        <div class="top-container">
            <!-- Logo area with Nav inside it -->
            <div class="logo">
                <img src="logo.jpg" alt="Dhanika Instruments Logo" class="main-logo">

                <!-- Mobile Menu Toggle -->
                <input type="checkbox" id="menu-toggle" class="menu-toggle">
                <label for="menu-toggle" class="menu-icon"><i class="fas fa-bars"></i></label>

                <ul class="nav-menu">
                    <li><a href="#">HOME</a></li>
                    <li><a href="#">ABOUT US</a></li>
                    <li><a href="#">PRODUCTS</a></li>
                    <li class="contact-btn"><a href="#">CONTACT US</a></li>
                </ul>
            </div>

            <!-- Right side: Social and Contact -->
            <div class="header-right">
                <div class="social-icons">
                    <a href="#" class="social-icon"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" class="social-icon"><i class="fab fa-twitter"></i></a>
                    <a href="#" class="social-icon"><i class="fab fa-google-plus-g"></i></a>
                </div>
                <div class="contact-info">
                    <span class="phone"><i class="fas fa-mobile-alt"></i> +91-8860525333</span>
                    <span class="email"><i class="fas fa-envelope"></i> dhanika.info@gmail.com</span>
                </div>
                <div class="search-box">
                    <form action="#" method="GET">
                        <input type="text" placeholder="Search" name="search">
                        <button type="submit"><i class="fas fa-search"></i></button>
                    </form>
                </div>
            </div>
        </div>
    </header>

    <!-- Banner Section -->
    <section class="banner-section">
        <img src="banner.png" alt="Dhanika Instruments Banner" class="banner-image">
    </section>

</body>

</html>
